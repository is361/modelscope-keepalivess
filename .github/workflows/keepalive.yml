name: Spaces Keepalive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ModelScope Space
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://modelscope.cn/studios/is3610303/hermes_computer")
          echo "HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning ::Unexpected status ${HTTP_CODE}"
          fi
