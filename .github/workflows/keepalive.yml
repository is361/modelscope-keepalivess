name: ModelScope Keep-Alive

on:
  push:
    branches: [master]
  schedule:
    # 每 5 分钟触发一次（UTC 时间）
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ModelScope Space
        run: |
          SPACE_URL="https://modelscope.cn/studios/is3610303/openclaw-computer"
          echo "Pinging $SPACE_URL at $(date)"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$SPACE_URL" || echo "FAIL")
          echo "Response: HTTP $HTTP_CODE"